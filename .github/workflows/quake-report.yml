name: Taiwan Earthquake Report

# 地震是事件驅動的：每 15 分鐘輪詢一次氣象署正式地震報告，有新報告才推播。
# ⚠️ 這不是地震預警。訊息會在地震後約 15~40 分鐘（含 GitHub 排程延遲）才送達，
#    僅供事後了解完整報告，即時避難請以氣象署警報 App 為準。
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write   # 需要把 data/seen_quakereports.json 推回 repo

# 避免前一次執行還沒跑完就啟動下一次（同時寫 seen 檔會衝突）
concurrency:
  group: quake-report
  cancel-in-progress: false

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Check for new earthquake reports
        env:
          CWA_API_KEY: ${{ secrets.CWA_API_KEY }}
          DISCORD_WEBHOOK_QUAKE: ${{ secrets.DISCORD_WEBHOOK_QUAKE }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: python scripts/quakereport.py

      - name: Commit seen-list
        run: |
          git config user.name "quake-report-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/seen_quakereports.json
          git diff --cached --quiet || git commit -m "chore: update quake-report seen list [skip ci]"
          git pull --rebase --autostash || true
          git push
