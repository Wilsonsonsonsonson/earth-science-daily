name: Daily Science Digests

on:
  schedule:
    # 23:37 UTC = 07:37 台北時間。刻意避開整點（尤其 00:00 UTC 是 GitHub Actions
    # 最壅塞的時段，排程可能延遲 1~3 小時）；用冷門分鐘數讓實際送達時間貼近 8 點。
    - cron: "37 23 * * *"
  workflow_dispatch: {}   # 讓你可以在 GitHub 網頁上手動按「Run workflow」測試

permissions:
  contents: write   # 需要把 data/ 與 archive/ 的更新推回 repo

# 兩份刊物在同一個 job 內依序執行：它們會寫入同一個 repo，分開跑會 push 衝突。
jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 🌍 地球科學日報 ──────────────────────────────
      - name: Run earth science digest
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          CWA_API_KEY: ${{ secrets.CWA_API_KEY }}
        run: python scripts/digest.py

      - name: Post earthquake figures (record section + ShakeMap)
        continue-on-error: true   # 圖產不出來（無合格地震／測站資料未就緒）不影響日報
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python scripts/quakeplot.py

      # ── 🧬 醫學生物日報 ──────────────────────────────
      - name: Run biomed digest
        continue-on-error: true   # 生醫版失敗不影響地科版已發出的內容
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          DISCORD_WEBHOOK_BIOMED: ${{ secrets.DISCORD_WEBHOOK_BIOMED }}
        run: python scripts/biomed.py

      - name: Commit state and archives
        run: |
          git config user.name "science-digest-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/ archive/ archive-biomed/
          git diff --cached --quiet || git commit -m "chore: daily digest state + archives [skip ci]"
          git push
